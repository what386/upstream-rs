name: Release
on:
  push:
    tags:
      - "v*"
permissions:
  contents: write
  actions: read
jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_ext: ""
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary_ext: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            binary_ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_ext: ".exe"
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            binary_ext: ".exe"
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
      - name: Archive binary
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/upstream${{ matrix.binary_ext }} dist/upstream-${{ matrix.target }}${{ matrix.binary_ext }}
        shell: bash
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: upstream-${{ matrix.target }}
          path: dist/upstream-${{ matrix.target }}${{ matrix.binary_ext }}
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
      - name: Add completion assets
        run: |
          cp completions/completions.bash dist/completions.bash
          cp completions/completions.fish dist/completions.fish
          cp completions/completions.zsh dist/completions.zsh
          cp completions/completions.ps1 dist/completions.ps1
          cp completions/completions.elvish dist/completions.elvish
      - name: Generate release SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: dist/upstream.spdx.json
          upload-artifact: false
          upload-release-assets: false
      - name: Generate checksums
        run: |
          cd dist
          checksum_file="$RUNNER_TEMP/SHA256SUMS.txt"
          find . -type f ! -name SHA256SUMS.txt -print0 \
            | sort -z \
            | xargs -0 sha256sum > "$checksum_file"
          mv "$checksum_file" SHA256SUMS.txt
      - name: Install Minisign
        run: |
          sudo apt-get update
          sudo apt-get install -y expect minisign
      - name: Sign release assets
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          test -n "$MINISIGN_SECRET_KEY"
          key="$RUNNER_TEMP/minisign.key"
          trap 'rm -f "$key"' EXIT
          printf '%s\n' "$MINISIGN_SECRET_KEY" > "$key"
          chmod 600 "$key"

          if grep -q 'encrypted secret key' "$key"; then
            test -n "$MINISIGN_PASSWORD"
          fi

          find dist -type f ! -name '*.minisig' -print0 \
            | while IFS= read -r -d '' file; do
                export MINISIGN_KEY="$key"
                export MINISIGN_FILE="$file"
                expect <<'EOF'
          set timeout -1
          spawn minisign -S -s $env(MINISIGN_KEY) -m $env(MINISIGN_FILE) -x ${env(MINISIGN_FILE)}.minisig
          expect {
            -re "(?i)password:" {
              send -- "$env(MINISIGN_PASSWORD)\r"
              exp_continue
            }
            eof
          }
          set result [wait]
          exit [lindex $result 3]
          EOF
              done
      - name: Read changelog section for tag
        id: release_notes
        run: |
          RELEASE_NOTES="$(./scripts/changelog_for_tag.bash "${{ github.ref_name }}")"
          {
            echo "body<<__RELEASE_NOTES__"
            printf '%s\n' "$RELEASE_NOTES"
            echo "__RELEASE_NOTES__"
          } >> "$GITHUB_OUTPUT"
      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          body: ${{ steps.release_notes.outputs.body }}
          files: dist/**/*
