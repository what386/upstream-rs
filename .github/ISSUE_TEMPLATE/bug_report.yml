name: Bug report
description: Report a reproducible problem with upstream.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please include enough detail to reproduce the issue.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A concise description of the problem.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps and sample commands.
      placeholder: |
        1. Do `...`
        2. Observe error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What actually happened?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: upstream version
      description: Output of `upstream --version`.
      placeholder: upstream x.y.z
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / errors
      description: Paste relevant command output and stack traces.
      render: shell
    validations:
      required: false

  - type: textarea
    id: config
    attributes:
      label: Relevant config
      description: Redact secrets before sharing.
      placeholder: Paste relevant config, if applicable.
    validations:
      required: false
